name: Android CI & Release
'on':
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew assembleRelease
        env:
          GITHUB_RUN_NUMBER: '${{ github.run_number }}'
          GITHUB_REF_NAME: '${{ github.ref_name }}'
      - name: Setup build tool version variable
        shell: bash
        run: |
          BUILD_TOOL_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
          echo "BUILD_TOOL_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV
          echo Last build tool version is: $BUILD_TOOL_VERSION
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: '${{ secrets.KEYSTORE }}'
          alias: '${{ secrets.KEY_ALIAS }}'
          keyStorePassword: '${{ secrets.KEYSTORE_PASSWORD }}'
          keyPassword: '${{ secrets.KEY_PASSWORD }}'
        env:
          BUILD_TOOLS_VERSION: ${{ env.BUILD_TOOL_VERSION }}

      - name: Rename and Isolate Signed APK
        if: success() && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          # Create a clean directory for the final artifact
          mkdir -p final_binaries
          
          OLD_PATH="${{ steps.sign_app.outputs.signedReleaseFile }}"
          NEW_NAME="LyriSync-${{ github.ref_name }}.apk"
          NEW_PATH="final_binaries/$NEW_NAME"
          
          # Move the file to the new clean folder
          mv "$OLD_PATH" "$NEW_PATH"
          
          # Pass the specific NEW_PATH to the environment
          echo "FINAL_APK=$NEW_PATH" >> $GITHUB_ENV
          echo "Prepared $NEW_NAME for release."

          - name: Upload to GitHub Release
            if: startsWith(github.ref, 'refs/tags/')
            uses: softprops/action-gh-release@v2
            with:
              # Point ONLY to the specific file in the clean folder
              files: ${{ env.FINAL_APK }}
              generate_release_notes: true
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}