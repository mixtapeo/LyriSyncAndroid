name: Android CI & Release

on:
  push:
    branches: [ "master" ]
    tags: [ 'v*' ] # Triggers release when you push a tag like v1.0
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create the release

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17 # Updated to 17 for modern Android Gradle Plugins
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. Build the Release APK
    - name: Build with Gradle
      run: ./gradlew assembleRelease
      env:
        # These pass the GitHub metadata into your Gradle script
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
        GITHUB_REF_NAME: ${{ github.ref_name }}

    # 2. Sign the APK (Uses a community action to handle the Keystore secret)
    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.KEYSTORE }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    # 3. Create GitHub Release (Only runs on tags)
    - name: Upload to GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
